name: flutter_map_markers_example
description: "An example application for the flutter_map_markers package."

publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_map: ^8.2.2
  flutter_map_markers:
  latlong2: ^0.9.1

dependency_overrides: 
  flutter_map_markers:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/sun_cloud_64.png
    - assets/sun_and_marker.png
    - assets/circle_16.png
    - assets/circle_32.png
    - assets/circles_16x10.png
