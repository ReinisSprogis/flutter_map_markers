name: flutter_map_markers_example
description: "An example application for the flutter_map_markers package."

publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_map: ^8.2.2
  flutter_map_markers:
  latlong2: ^0.9.1

dependency_overrides: 
  flutter_map_markers:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/sun_cloud_64.png
    - assets/sun_and_marker.png
    - assets/circle_16.png
    - assets/circle_32.png
    - assets/circles_16x10.png
    - assets/heli_8.png
    - assets/heli_2.png
    - assets/red_marker.png
    - assets/red_marker_48.png
    - assets/two_markers_48.png
    - assets/markers_48x10.png
    - assets/markers_48x10_anim.png
    - assets/markers_48x10_anim_colored.png
    - assets/markers_animated_480x90_10x48.png
    - assets/diamond_marker_anim.png
    - assets/heli_fire.png
    - assets/red_circle_48x48.png
    - assets/gem_red_and_white.png
    - assets/gemstone.png
    